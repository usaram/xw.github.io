<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
:root { --main:#c77dff; }

body {
  margin:0;
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  color:white;
}

/* CARD */
.box {
  width:300px;
  padding:20px;
  border-radius:20px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);

  box-shadow:0 0 20px var(--main),0 0 50px var(--main);
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:6px 0;

  border:none;
  border-radius:10px;

  background:rgba(0,0,0,0.6);
  color:white;
}

/* BOTÃO */
button {
  width:100%;
  padding:10px;
  margin-top:10px;

  border:none;
  border-radius:10px;

  background:var(--main);
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Login</h3>
  <input id="passInput" placeholder="Senha">
  <button onclick="doLogin()">Entrar</button>
</div>

<!-- PAINEL -->
<div class="box" id="panelBox" style="display:none">

  <h3>⚙️ Painel</h3>

  <input id="idInput" placeholder="ID Discord">
  <input id="nickInput" placeholder="Nick personalizado">
  <input type="color" id="colorInput">

  <input id="twitterInput" placeholder="Twitter">
  <input id="instaInput" placeholder="Instagram">
  <input id="tiktokInput" placeholder="TikTok">
  <input id="robloxInput" placeholder="Roblox">

  <button onclick="saveProfile()">Salvar</button>

</div>

<script>
const PASSWORD = "1234";

// ELEMENTOS
const loginBox = document.getElementById("loginBox");
const panelBox = document.getElementById("panelBox");
const passInput = document.getElementById("passInput");

// LOGIN
function doLogin(){
  if(passInput.value === PASSWORD){
    loginBox.style.display = "none";
    panelBox.style.display = "block";
  } else {
    alert("Senha errada");
  }
}

// SALVAR
function saveProfile(){

  const id = document.getElementById("idInput").value;
  const nick = document.getElementById("nickInput").value;
  const color = document.getElementById("colorInput").value;

  const twitter = document.getElementById("twitterInput").value;
  const insta = document.getElementById("instaInput").value;
  const tiktok = document.getElementById("tiktokInput").value;
  const roblox = document.getElementById("robloxInput").value;

  if(!id){
    alert("Coloca o ID primeiro");
    return;
  }

  const profiles =
    JSON.parse(localStorage.getItem("profiles")) || [];

  const newProfile = {
    id,
    nick,
    color,
    links: {
      twitter,
      insta,
      tiktok,
      roblox
    }
  };

  const updated =
    profiles.filter(p => p.id !== id);

  updated.push(newProfile);

  localStorage.setItem("profiles", JSON.stringify(updated));

  alert("Salvo com sucesso!");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h2>🔐 Login</h2>
<input id="pass" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="panel" style="display:none">

<h2>Painel</h2>

<input id="id" placeholder="ID do Discord">
<input type="color" id="color">
<input id="twitter" placeholder="Twitter">
<input id="insta" placeholder="Instagram">
<input id="tiktok" placeholder="TikTok">
<input id="roblox" placeholder="Roblox">

<br><br>
<button onclick="save()">Salvar Conta</button>

</div>

<script>
const PASSWORD = "1234"; // 🔐 MUDA AQUI

function login(){
  if(pass.value === PASSWORD){
    document.getElementById("panel").style.display="block";
    pass.style.display="none";
  } else {
    alert("Senha errada");
  }
}

function save(){
  const profiles =
    JSON.parse(localStorage.getItem("profiles")) || [];

  const profile = {
    id: id.value,
    color: color.value,
    links: {
      twitter: twitter.value,
      insta: insta.value,
      tiktok: tiktok.value,
      roblox: roblox.value
    }
  };

  // evitar duplicar ID
  const filtered =
    profiles.filter(p => p.id !== profile.id);

  filtered.push(profile);

  localStorage.setItem("profiles", JSON.stringify(filtered));

  alert("Conta salva!");
}
</script>

</body>
</html>

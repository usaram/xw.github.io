<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Dark Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>

<div class="overlay"></div>

<div class="container">

  <!-- PERSONAGEM -->
  <div class="character-area">

    <!-- TROQUE PELA SUA IMAGEM -->
    <img src="mariya.png" class="character" id="character">

  </div>

  <!-- DIREITA -->
  <div class="right-side">

    <div class="jp-text">
      レインズ
    </div>

    <div class="socials">

      <a class="social" href="https://x.com" target="_blank">
        <span>ツイッター</span>
        <small>Twitter / X</small>
      </a>

      <a class="social" href="https://instagram.com" target="_blank">
        <span>インスタ</span>
        <small>Instagram</small>
      </a>

      <a class="social" href="https://tiktok.com" target="_blank">
        <span>ティックトック</span>
        <small>TikTok</small>
      </a>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>

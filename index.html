<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Anime UI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="snow"></canvas>

<div class="bg"></div>

<div class="layout">

  <!-- ESQUERDA -->
  <div class="left">

    <!-- PERSONAGEM -->
    <div id="character">
      <!-- aqui vai o 3D depois -->
    </div>

    <!-- REDES -->
    <div class="socials">

      <div class="item">
        <span>ツイッター</span>
        <div class="hover">
          <a href="#">Twitter</a>
        </div>
      </div>

      <div class="item">
        <span>インスタ</span>
        <div class="hover">
          <a href="#">Instagram</a>
        </div>
      </div>

      <div class="item">
        <span>ティックトック</span>
        <div class="hover">
          <a href="#">TikTok</a>
        </div>
      </div>

      <div class="item">
        <span>ディスコード</span>
        <div class="hover" id="discordInfo">
          carregando...
        </div>
      </div>

    </div>

  </div>

  <!-- DIREITA -->
  <div class="right">
    <h1>My Profile</h1>
    <p id="activity"></p>
  </div>

</div>

<script src="snow.js"></script>
<script src="script.js"></script>
</body>
</html>

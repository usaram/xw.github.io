<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚡ Painel</h2>

    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('contas')">Contas</button>
    <button onclick="showTab('config')">Config</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <!-- HOME -->
    <div id="home" class="tab active">
      <h1>Dashboard</h1>

      <div class="card">
        <img src="https://via.placeholder.com/100">
        <h2>Seu Nome</h2>
        <p>Status: Online</p>
      </div>
    </div>

    <!-- CONTAS -->
    <div id="contas" class="tab">
      <h1>Contas Conectadas</h1>

      <div id="accounts"></div>

      <button class="add" onclick="addAccount()">+ Adicionar Conta</button>
    </div>

    <!-- CONFIG -->
    <div id="config" class="tab">
      <h1>Configurações</h1>

      <button onclick="toggleTheme()">Trocar Tema</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOID ULTRA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bg-video">
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- LOADING -->
<div id="loading">booting system...</div>

<!-- LOGIN -->
<div id="login">
  <h2>ACCESS TERMINAL</h2>
  <input placeholder="user">
  <input type="password" placeholder="password">
  <button onclick="enterSite()">ENTER</button>
</div>

<!-- SITE -->
<div id="site" class="hidden">

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<button onclick="toggleMusic()">🎵</button>
<button onclick="toggleTheme()">⚡</button>
<button onclick="toggleEditor()">⚙️</button>

<div class="container glitch">

  <img id="avatar" src="https://via.placeholder.com/150">

  <h1 id="name">void.exe</h1>
  <p id="bio">system override</p>

  <div id="links"></div>

  <p>views: <span id="views"></span></p>

</div>

<!-- EDITOR -->
<div id="editor" class="hidden">
  <input id="editName" placeholder="Nome">
  <input id="editBio" placeholder="Bio">
  <input id="editAvatar" placeholder="Avatar">
  <textarea id="editLinks" placeholder="nome|link"></textarea>
  <button onclick="saveConfig()">Salvar</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>

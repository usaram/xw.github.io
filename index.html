<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOID PROFILE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="particles"></div>

<div class="card">

  <!-- DISCORD -->
  <img id="avatar">
  <h1 id="username">loading...</h1>
  <p id="status"></p>
  <p id="activity"></p>

  <!-- REDES -->
  <div class="socials">
    <a id="twitter"><i class="fab fa-x-twitter"></i></a>
    <a id="instagram"><i class="fab fa-instagram"></i></a>
    <a id="tiktok"><i class="fab fa-tiktok"></i></a>
  </div>

  <!-- EDITAR -->
  <button onclick="toggleEditor()" class="edit-btn">⚙️</button>

</div>

<!-- EDITOR -->
<div id="editor">
  <input id="editTwitter" placeholder="Link Twitter/X">
  <input id="editInsta" placeholder="Link Instagram">
  <input id="editTiktok" placeholder="Link Tiktok">
  <button onclick="saveLinks()">Salvar</button>
</div>

<script src="script.js"></script>
</body>
</html>

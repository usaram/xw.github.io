<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Insano</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="app">

  <div class="sidebar">
    <h2>⚡ Painel</h2>

    <button class="active" onclick="showTab('home', this)">Home</button>
    <button onclick="showTab('contas', this)">Contas</button>
    <button onclick="showTab('config', this)">Config</button>
  </div>

  <div class="content">

    <div id="home" class="tab active">
      <h1>Dashboard</h1>

      <div class="card">
        <img src="https://via.placeholder.com/100">
        <h2>Seu Nome</h2>
        <p>Status: Online</p>
      </div>
    </div>

    <div id="contas" class="tab">
      <h1>Contas</h1>
      <div id="accounts"></div>
      <button class="glow" onclick="addAccount()">+ Adicionar</button>
    </div>

    <div id="config" class="tab">
      <h1>Config</h1>
      <button class="glow" onclick="toggleTheme()">Trocar Tema</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
